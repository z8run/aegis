# cargo-deny configuration for aegis-scan
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

# -- Advisories --
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

# -- Licenses --
[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
]
copyleft = "deny"
confidence-threshold = 0.8

# -- Bans (duplicate crate detection) --
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# -- Sources --
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
