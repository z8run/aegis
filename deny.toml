# cargo-deny configuration for aegis-scan
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

# -- Advisories --
[advisories]
version = 2
ignore = []

# -- Licenses --
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "MPL-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
]
confidence-threshold = 0.8

# -- Bans (duplicate crate detection) --
[bans]
multiple-versions = "warn"
wildcards = "allow"

# -- Sources --
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
